<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>App de Garantias — MILL INDÚSTRIAS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
</head>
<body>

<!-- HEADER -->
<header class="app-header" th:fragment="header(pageTitle)">
    <a href="/menu" class="header-logo">
        <span class="logo-mark">MILL</span>
        <span class="logo-sep"></span>
        <span class="logo-app">App de Garantias</span>
    </a>
    <span class="header-title" th:text="${pageTitle}">Título</span>
    <div class="header-actions">
        <span class="user-info" sec:authentication="name">Usuário</span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary btn-sm">⇠ Sair</button>
        </form>
    </div>
</header>

<!-- FLASH MESSAGES -->
<div th:fragment="alerts">
    <div th:if="${sucesso}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger">
        <span>✗</span>
        <span th:text="${erro}"></span>
    </div>
</div>

<!-- PAGINATION -->
<nav th:fragment="pagination(paginaAtual, totalPaginas, url)" class="pagination" th:if="${totalPaginas > 1}">
    <a th:if="${paginaAtual > 0}" th:href="@{${url}(pagina=${paginaAtual - 1})}">‹</a>
    <th:block th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}">
        <span th:if="${i == paginaAtual}" class="active" th:text="${i + 1}"></span>
        <a th:if="${i != paginaAtual}" th:href="@{${url}(pagina=${i})}" th:text="${i + 1}"></a>
    </th:block>
    <a th:if="${paginaAtual < totalPaginas - 1}" th:href="@{${url}(pagina=${paginaAtual + 1})}">›</a>
</nav>

</body>
</html>
