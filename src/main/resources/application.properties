spring.application.name=mill-garantias

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:milldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Garante que JPA cria as tabelas ANTES de executar o data.sql
spring.jpa.defer-datasource-initialization=true

# SQL init (data.sql)
spring.sql.init.mode=always

# H2 Console (acessivel em /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.com.mill=INFO
