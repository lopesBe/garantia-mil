<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — App de Garantias MILL</title>
    <meta name="description" content="Sistema de Gestão de Garantias MILL INDÚSTRIAS - Login"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

<div class="login-card">
    <div class="login-logo">
        <div class="logo-text">MILL</div>
        <div class="logo-subtitle">Indústrias</div>
    </div>

    <h1 class="login-titulo">App de Garantias</h1>

    <!-- Mensagem de erro -->
    <div th:if="${param.error}" class="alert alert-danger">
        <span>✗</span>
        <span>Usuário ou senha inválidos. Tente novamente.</span>
    </div>

    <!-- Mensagem de logout -->
    <div th:if="${param.logout}" class="alert alert-success">
        <span>✓</span>
        <span>Você saiu com sucesso.</span>
    </div>

    <form th:action="@{/login}" method="post" id="login-form">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text"
                   id="username"
                   name="username"
                   class="form-control"
                   placeholder="Digite seu usuário"
                   autocomplete="username"
                   required
                   autofocus/>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="form-control"
                   placeholder="Digite sua senha"
                   autocomplete="current-password"
                   required/>
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit" id="btn-entrar" class="btn btn-primary btn-lg btn-block" style="margin-top: 8px;">
            Entrar
        </button>
    </form>

    <p style="text-align:center; margin-top: 20px; font-size: 11px; color: #666;">
        MILL INDÚSTRIAS © 2024 — Sistema Interno
    </p>
</div>

</body>
</html>
