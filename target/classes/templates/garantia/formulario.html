<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo} + ' — MILL'">Garantia — MILL</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
</head>
<body>

<header class="app-header">
    <a href="/menu" class="header-logo">
        <span class="logo-mark">MILL</span>
        <span class="logo-sep"></span>
        <span class="logo-app">App de Garantias</span>
    </a>
    <span class="header-title" th:text="${titulo}">Garantia</span>
    <div class="header-actions">
        <span class="user-info" sec:authentication="name">Usuário</span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary btn-sm">⇠ Sair</button>
        </form>
    </div>
</header>

<main class="page-wrapper">
    <nav class="breadcrumb">
        <a href="/menu">Menu</a>
        <span class="sep">›</span>
        <a href="/garantia">Garantias</a>
        <span class="sep">›</span>
        <span class="current" th:text="${titulo}">Formulário</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title" th:text="${titulo}">Garantia</h1>
    </div>

    <div th:if="${sucesso}" class="alert alert-success">
        <span>✓</span><span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger">
        <span>✗</span><span th:text="${erro}"></span>
    </div>

    <form th:action="@{/garantia/salvar}" method="post" id="form-garantia">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="id" th:value="${garantia.id}"/>

        <!-- SEÇÃO 1: Identificação -->
        <div class="form-card" style="margin-bottom:20px;">
            <div class="form-card-header">
                <span class="section-icon">🛡️</span>
                <h3>Identificação da Garantia</h3>
            </div>
            <div class="form-card-body">
                <div class="form-grid form-grid-3">
                    <div class="form-group">
                        <label>Número da Solicitação</label>
                        <input type="text" class="form-control"
                               th:value="${garantia.numero != null ? garantia.numero : 'Gerado automaticamente'}"
                               readonly style="opacity:0.6;cursor:default;"/>
                    </div>
                    <div class="form-group">
                        <label for="numeroNota">Nº da Nota Fiscal</label>
                        <input type="text" id="numeroNota" name="numeroNota" class="form-control"
                               placeholder="NF-000000" th:value="${garantia.numeroNota}"/>
                    </div>
                    <div class="form-group">
                        <label for="dataSolicitacao">Data da Solicitação</label>
                        <input type="date" id="dataSolicitacao" name="dataSolicitacao" class="form-control"
                               th:value="${garantia.dataSolicitacao}"/>
                    </div>
                    <div class="form-group">
                        <label for="cnpjCliente">CNPJ do Cliente</label>
                        <input type="text" id="cnpjCliente" name="cnpjCliente" class="form-control"
                               placeholder="00.000.000/0000-00" th:value="${garantia.cnpjCliente}"/>
                    </div>
                    <div class="form-group col-span-2">
                        <label for="nomeCliente">Nome do Cliente *</label>
                        <input type="text" id="nomeCliente" name="nomeCliente" class="form-control" required
                               placeholder="Razão social completa" th:value="${garantia.nomeCliente}"/>
                    </div>
                    <div class="form-group col-span-3">
                        <label for="reclamacaoId">Reclamação Vinculada</label>
                        <select id="reclamacaoId" name="reclamacaoId" class="form-control">
                            <option value="">— Nenhuma —</option>
                            <option th:each="rec : ${reclamacoes}"
                                    th:value="${rec.id}"
                                    th:text="${rec.numero + ' — ' + rec.nomeCliente}"
                                    th:selected="${garantia.reclamacao != null and garantia.reclamacao.id == rec.id}">
                            </option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- SEÇÃO 2: Itens da Garantia -->
        <div class="form-card" style="margin-bottom:20px;">
            <div class="form-card-header">
                <span class="section-icon">📦</span>
                <h3>Itens da Garantia</h3>
            </div>
            <div class="form-card-body">
                <div class="items-table-wrapper">
                    <table class="items-table" id="tabela-itens">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Descrição</th>
                                <th style="width:90px;">Qtd</th>
                                <th style="width:90px;">Unidade</th>
                                <th style="width:50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="tbody-itens">
                            <!-- Itens existentes -->
                            <tr th:each="item : ${garantia.itens}" class="item-row">
                                <td><input type="text" name="item.codigo" class="form-control"
                                           th:value="${item.codigo}" placeholder="CÓD-001"/></td>
                                <td><input type="text" name="item.descricao" class="form-control"
                                           th:value="${item.descricao}" placeholder="Descrição do item"/></td>
                                <td><input type="number" name="item.quantidade" class="form-control"
                                           th:value="${item.quantidade}" placeholder="0" min="0"/></td>
                                <td>
                                    <select name="item.unidade" class="form-control">
                                        <option th:value="'UN'" th:selected="${item.unidade == 'UN'}">UN</option>
                                        <option th:value="'KG'" th:selected="${item.unidade == 'KG'}">KG</option>
                                        <option th:value="'M'"  th:selected="${item.unidade == 'M'}">M</option>
                                        <option th:value="'M2'" th:selected="${item.unidade == 'M2'}">M²</option>
                                        <option th:value="'M3'" th:selected="${item.unidade == 'M3'}">M³</option>
                                        <option th:value="'L'"  th:selected="${item.unidade == 'L'}">L</option>
                                        <option th:value="'CX'" th:selected="${item.unidade == 'CX'}">CX</option>
                                        <option th:value="'PC'" th:selected="${item.unidade == 'PC'}">PC</option>
                                    </select>
                                </td>
                                <td>
                                    <button type="button" class="btn-remove-item" onclick="removerItem(this)" title="Remover item">✕</button>
                                </td>
                            </tr>
                            <!-- Linha vazia se não há itens -->
                            <tr th:if="${#lists.isEmpty(garantia.itens)}" class="item-row">
                                <td><input type="text" name="item.codigo" class="form-control" placeholder="CÓD-001"/></td>
                                <td><input type="text" name="item.descricao" class="form-control" placeholder="Descrição do item"/></td>
                                <td><input type="number" name="item.quantidade" class="form-control" placeholder="0" min="0"/></td>
                                <td>
                                    <select name="item.unidade" class="form-control">
                                        <option value="UN" selected>UN</option>
                                        <option value="KG">KG</option>
                                        <option value="M">M</option>
                                        <option value="M2">M²</option>
                                        <option value="M3">M³</option>
                                        <option value="L">L</option>
                                        <option value="CX">CX</option>
                                        <option value="PC">PC</option>
                                    </select>
                                </td>
                                <td>
                                    <button type="button" class="btn-remove-item" onclick="removerItem(this)" title="Remover item">✕</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn btn-secondary btn-sm btn-add-item" id="btn-add-item" onclick="adicionarItem()">
                    ＋ Adicionar Item
                </button>
            </div>
        </div>

        <!-- SEÇÃO 3: Decisão -->
        <div class="form-card" style="margin-bottom:20px;">
            <div class="form-card-header">
                <span class="section-icon">⚖️</span>
                <h3>Decisão da Garantia</h3>
            </div>
            <div class="form-card-body">
                <div class="form-grid form-grid-2">
                    <div class="form-group">
                        <label for="status">Status da Garantia *</label>
                        <select id="status" name="status" class="form-control" required>
                            <option value="Pendente"   th:selected="${garantia.status == 'Pendente'}">Pendente</option>
                            <option value="Em Análise" th:selected="${garantia.status == 'Em Análise'}">Em Análise</option>
                            <option value="Aprovada"   th:selected="${garantia.status == 'Aprovada'}">Aprovada</option>
                            <option value="Reprovada"  th:selected="${garantia.status == 'Reprovada'}">Reprovada</option>
                            <option value="Cancelada"  th:selected="${garantia.status == 'Cancelada'}">Cancelada</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="responsavelDecisao">Responsável pela Decisão</label>
                        <input type="text" id="responsavelDecisao" name="responsavelDecisao" class="form-control"
                               placeholder="Nome do responsável" th:value="${garantia.responsavelDecisao}"/>
                    </div>
                    <div class="form-group">
                        <label for="dataDecisao">Data da Decisão</label>
                        <input type="date" id="dataDecisao" name="dataDecisao" class="form-control"
                               th:value="${garantia.dataDecisao}"/>
                    </div>
                    <div class="form-group col-span-2">
                        <label for="observacoesAnalise">Observações da Análise</label>
                        <textarea id="observacoesAnalise" name="observacoesAnalise" class="form-control" rows="3"
                                  placeholder="Observações do processo de análise..."
                                  th:text="${garantia.observacoesAnalise}"></textarea>
                    </div>
                    <div class="form-group col-span-2">
                        <label for="conclusao">Conclusão / Decisão</label>
                        <textarea id="conclusao" name="conclusao" class="form-control" rows="3"
                                  placeholder="Conclusão final e decisão sobre a garantia..."
                                  th:text="${garantia.conclusao}"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ações -->
        <div class="d-flex gap-8">
            <button type="submit" id="btn-salvar" class="btn btn-primary">💾 Salvar</button>
            <a href="/garantia" class="btn btn-secondary">✕ Cancelar</a>
        </div>
    </form>
</main>

<script>
function adicionarItem() {
    const tbody = document.getElementById('tbody-itens');
    const row = document.createElement('tr');
    row.className = 'item-row';
    row.innerHTML = `
        <td><input type="text" name="item.codigo" class="form-control" placeholder="CÓD-001"/></td>
        <td><input type="text" name="item.descricao" class="form-control" placeholder="Descrição do item"/></td>
        <td><input type="number" name="item.quantidade" class="form-control" placeholder="0" min="0"/></td>
        <td>
            <select name="item.unidade" class="form-control">
                <option value="UN" selected>UN</option>
                <option value="KG">KG</option>
                <option value="M">M</option>
                <option value="M2">M²</option>
                <option value="M3">M³</option>
                <option value="L">L</option>
                <option value="CX">CX</option>
                <option value="PC">PC</option>
            </select>
        </td>
        <td><button type="button" class="btn-remove-item" onclick="removerItem(this)" title="Remover item">✕</button></td>
    `;
    tbody.appendChild(row);
    row.querySelector('input').focus();
}

function removerItem(btn) {
    const tbody = document.getElementById('tbody-itens');
    if (tbody.querySelectorAll('.item-row').length <= 1) {
        // Mantém pelo menos uma linha (limpa os valores)
        const row = btn.closest('tr');
        row.querySelectorAll('input').forEach(i => i.value = '');
        row.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        return;
    }
    btn.closest('tr').remove();
}
</script>

</body>
</html>
